services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shortener
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener -d shortener"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      target: migrator
      args:
        GOOSE_VERSION: ${GOOSE_VERSION:-v3.27.1}
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOOSE_DBSTRING: postgres://shortener:shortener@db:5432/shortener?sslmode=disable
    command: ["up"]
    restart: "no"

  app:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      HTTP_ADDR: ":8080"
      STORAGE_TYPE: postgres
      POSTGRES_DSN: postgres://shortener:shortener@db:5432/shortener?sslmode=disable
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      SHUTDOWN_TIMEOUT: 10s
      READINESS_TIMEOUT: 2s
    ports:
      - "${HOST_PORT:-8080}:8080"
    init: true

volumes:
  postgres_data:
